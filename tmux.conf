# colors: tmux-256color gives proper italics / undercurl; advertise truecolor
# to apps running inside tmux via the outer terminal's terminfo entry
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# History per pane. Use pipe-pane to a file for true unlimited logging.
set -g history-limit 100000

set -g set-titles on
set -g set-titles-string "#S · #W"
set -s escape-time 0

# Windows and panes start at 1 (matches number-key layout)
set -g base-index 1
setw -g pane-base-index 1
# When a window is closed, renumber the rest to fill the gap
set -g renumber-windows on
# Mouse: click to focus, drag dividers, wheel-scroll history
set -g mouse on

# Auto-rename the window from the active pane's current command. Manually
# renamed windows (via `prefix ,` or escape sequence) stay locked to that
# name and won't be auto-renamed for the rest of the session.
set-window-option -g allow-rename on
set-window-option -g automatic-rename on

set-option -g default-shell /bin/zsh
# Non-login shells in panes — avoids /etc/zprofile re-running per pane
set-option -g default-command "${SHELL}"

# request focus events from the terminal emulator and forward them to applications running inside
set -g focus-events on

# Control-Space as prefix
unbind C-b
set -g prefix C-space
bind Space send-prefix

# Quick config reload
bind r source-file ~/.tmux.conf \; display "reloaded"

# act like vim
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# New windows and splits inherit the current pane's working directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi v send-keys -X begin-selection
# Setup 'y' to copy to clipboard
if-shell "command -v pbcopy" \
  "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
  "bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel"

# F12 toggles outer tmux off for nested sessions
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style "fg=#8a8a8a,bg=#444444" \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  refresh-client -S

# ─── Status bar ───
# Palette: Tokyo Night cyan/green + Catppuccin peach
#   #121212  canvas    bar base
#   #303030  surface   date block, inactive border, message
#   #9e9e9e  fg-dim    text on surface
#   #ffffff  fg-soft   inactive window text
#   #1a1b26  on-accent text on any accent block
#   #7dcfff  session   cyan
#   #fab387  active    peach (active window + active border)
#   #9ece6a  host      green
#   #f7768e  prefix    session bg when prefix is held
#   #dc2626  bell      bell (filled bg, white text)

set -g status on
set -g status-justify left
set -g status-style "bg=#121212"
set -g status-left-length 100
set -g status-right-length 100

set -g message-style "fg=#9e9e9e,bg=#303030"
set -g message-command-style "fg=#9e9e9e,bg=#303030"
set -g pane-border-style "fg=#303030"
set -g pane-active-border-style "fg=#fab387"

# Session block — bg flips to alert color when prefix is held
set -g status-left "#[fg=#1a1b26,bg=#{?client_prefix,#f7768e,#7dcfff},bold] #S #[fg=#{?client_prefix,#f7768e,#7dcfff},bg=#121212,nobold] "

# Date / time + hostname
set -g status-right "#[fg=#9e9e9e,bg=#303030] %Y-%m-%d | %H:%M #[fg=#1a1b26,bg=#9ece6a,bold] #h "

# Window list — active window pops with accent bg
# Colors live in *-style options (not the format) so activity/bell can layer on top
setw -g window-status-separator ""
setw -g window-status-style "fg=#ffffff,bg=#121212"
setw -g window-status-format " #I | #W "
setw -g window-status-current-style "fg=#1a1b26,bg=#fab387,bold"
setw -g window-status-current-format " #I | #W "

# Bell highlights (activity is constant noise in normal use, so don't style it)
setw -g monitor-activity off
set  -g visual-activity off
setw -g window-status-bell-style "fg=#ffffff,bg=#dc2626,bold,blink"
