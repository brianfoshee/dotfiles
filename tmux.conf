# colors: tmux-256color gives proper italics / undercurl; advertise truecolor
# to apps running inside tmux via the outer terminal's terminfo entry
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# History per pane. Use pipe-pane to a file for true unlimited logging.
set -g history-limit 100000

# check file exists before sourcing it in tmux.conf
if-shell "test -f ~/.tmuxline-snapshot" "source ~/.tmuxline-snapshot"

set -g set-titles on
set -g set-titles-string "#S · #W"
set -s escape-time 0

# Windows and panes start at 1 (matches number-key layout)
set -g base-index 1
setw -g pane-base-index 1
# When a window is closed, renumber the rest to fill the gap
set -g renumber-windows on
# Mouse: click to focus, drag dividers, wheel-scroll history
set -g mouse on

# allow escape sequences to rename tmux windows
set-window-option -g allow-rename on
set-window-option -g automatic-rename off

set-option -g default-shell /bin/zsh
# Non-login shells in panes — avoids /etc/zprofile re-running per pane
set-option -g default-command "${SHELL}"

# request focus events from the terminal emulator and forward them to applications running inside
set -g focus-events on

# Control-Space as prefix
unbind C-b
set -g prefix C-space
bind Space send-prefix

# Quick config reload
bind r source-file ~/.tmux.conf \; display "reloaded"

# act like vim
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# New windows and splits inherit the current pane's working directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi v send-keys -X begin-selection
# Setup 'y' to copy to clipboard
if-shell "command -v pbcopy" \
  "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
  "bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel"

# F12 toggles outer tmux off for nested sessions
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style "fg=colour245,bg=colour238" \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  refresh-client -S
